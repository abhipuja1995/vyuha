services:
  api:
    build: .
    command: >
      sh -c "uv sync --no-dev &&
             alembic upgrade head &&
             .venv/bin/uvicorn vyuha.orchestrator.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  dashboard:
    build: .
    command: >
      sh -c "uv sync --no-dev &&
             .venv/bin/streamlit run vyuha/dashboard/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - VYUHA_API_URL=http://api:8000
    depends_on:
      - api

  ui:
    build:
      context: ../vyuha-ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VYUHA_API_URL=http://api:8000
      - NODE_ENV=production
    depends_on:
      - api

  worker:
    build: .
    command: >
      sh -c "uv sync --no-dev &&
             .venv/bin/celery -A vyuha.workers.celery_app worker --loglevel=info --concurrency=4"
    env_file: .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vyuha
      POSTGRES_USER: vyuha
      POSTGRES_PASSWORD: vyuha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
