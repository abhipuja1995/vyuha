services:
  api:
    build: .
    command: uvicorn vyuha.orchestrator.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - ./assets:/app/assets

  dashboard:
    build: .
    command: streamlit run vyuha/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - api

  worker:
    build: .
    command: celery -A vyuha.orchestrator.workers worker --loglevel=info --concurrency=20
    env_file: .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vyuha
      POSTGRES_USER: vyuha
      POSTGRES_PASSWORD: vyuha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
